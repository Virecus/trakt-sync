name: Trakt Sync

on:
  repository_dispatch:
    types: [telegram_reel]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: node sync.js
        env:
          MESSAGE: ${{ github.event.client_payload.message }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
          WORKER_URL: ${{ secrets.WORKER_URL }}
